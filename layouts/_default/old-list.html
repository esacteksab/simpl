{{ define "main" }}
  <div class="flex flex-1 flex-col">
    <!--<h1>{{ .Title }}</h1>-->
    {{ .Content }}
    {{ range .Pages }}
      <h2><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h2>
      <span class="pt-1">{{ .Summary }}</span>
      <hr />
    {{ end }}
  </div>
  <div class="pager flex flex-1 flex-col">
    <ul class="bottom-8 flex list-none flex-wrap">
      <li class="mr-auto">
        {{ with .Prev }}
          <a href="{{ .RelPermalink }}">Previous Post</a>
        {{ end }}
      </li>
      <li class="ml-auto">
        {{ with .Next }}
          <a href="{{ .RelPermalink }}">Next Post</a>
        {{ end }}
      </li>
    </ul>
  </div>
{{ end }}
{{ template "_internal/pagination.html" . }}
