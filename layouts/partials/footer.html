<ul class="inline-flex list-inline text-center footer-links">
    {{ range .Site.Data.social.social_icons }}
    {{- if isset $.Site.Params.Author .id }}
    <li>
        {{ if ( hasPrefix ( index $.Site.Params.Author .id ) "https://" ) }}
        <a {{ if .rel }}rel="{{ .rel }}" {{- end -}} href="{{ printf "%s" ( index $.Site.Params.Author .id ) }}"
            title="{{ .title }}">
            {{ else }}
            <a {{ if .rel }}rel="{{ .rel }}" {{- end -}} href="{{ printf .url (index $.Site.Params.Author .id ) }}"
                title="{{ .title }}">
                {{ end }}
                <span class="fa-stack fa-lg">
                    <i class="fas fa-square fa-stack-2x"></i>
                    <i class="{{ .icon }} fa-stack-1x fa-inverse"></i>
                </span>
            </a>
    </li>
    {{- end -}}
    {{ end }}
</ul>
<p>Copyright {{ now.Year }}. All rights reserved.</p>
