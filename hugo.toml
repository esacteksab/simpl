[markup]
  [markup.goldmark]
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true
        title = true
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    lineNos = true
    lineNumbersInTable = true
    noClasses = false
  [markup.tableOfContents]
    endLevel = 6
    ordered = false
    startLevel = 2

#[module]
#  [module.hugoVersion]
#    extended = false
#    min = "0.116.0"
[outputs]
  home = ["html"]

[module]
  [module.hugoVersion]
    min = "0.128.0"
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "hugo_stats.json"
    target = "assets/notwatching/hugo_stats.json"
    disableWatch = true

[build.buildStats]
  enable = true

[[build.cachebusters]]
  source = "assets/notwatching/hugo_stats\\.json"
  target = "css"

[[build.cachebusters]]
  source = "(postcss|tailwind)\\.config\\.js"
  target = "css"

[[build.cachebusters]]
  source = 'layouts/.*'
  target = 'css'

[[server]]
[[headers]]
  for = '/*'
  [headers.values]
    Content-Security-Policy = 'script-src localhost:1313'
    Referrer-Policy = 'strict-origin-when-cross-origin'
    X-Content-Type-Options = 'nosniff'
    X-Frame-Options = 'DENY'
    X-XSS-Protection = '1; mode=block'

[pagination]
  pagerSize = 3
  path = "page"

[Params]
  socialShare = true

  [Params.Author]
    name = "Barry Morrison"
    github = "esacteksab"
    linkedin = "morrisonbarry"
    gitlab = "esacteksab"
